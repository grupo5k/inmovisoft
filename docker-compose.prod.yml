services:
  web:
    image: ${REGISTRY_HOST:-registry.xst.mx}/inmovisoft:${IMAGE_TAG:-latest}
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
