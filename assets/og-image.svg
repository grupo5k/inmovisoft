<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Inmovisoft Open Graph Image</title>
  <desc id="desc">Imagen de Open Graph para Inmovisoft, ERP inmobiliario.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1628" />
      <stop offset="55%" stop-color="#112040" />
      <stop offset="100%" stop-color="#1A3260" />
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9954C" />
      <stop offset="100%" stop-color="#E8B872" />
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="-10%" r="70%">
      <stop offset="0%" stop-color="#E8B872" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#E8B872" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#E8B872" stroke-opacity="0.12" stroke-width="1" />
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow)" />
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.45" />

  <g opacity="0.9" filter="url(#shadow)">
    <rect x="760" y="120" width="340" height="390" rx="28" fill="#0E1D38" stroke="#E8B872" stroke-opacity="0.25" />
    <rect x="790" y="166" width="130" height="16" rx="8" fill="#E8B872" fill-opacity="0.95" />
    <rect x="790" y="195" width="230" height="10" rx="5" fill="#DCE4F3" fill-opacity="0.45" />

    <rect x="790" y="240" width="64" height="64" rx="12" fill="#1A3260" />
    <rect x="868" y="240" width="64" height="64" rx="12" fill="#1A3260" />
    <rect x="946" y="240" width="64" height="64" rx="12" fill="#1A3260" />

    <rect x="790" y="334" width="230" height="12" rx="6" fill="#DCE4F3" fill-opacity="0.38" />
    <rect x="790" y="356" width="196" height="12" rx="6" fill="#DCE4F3" fill-opacity="0.3" />

    <rect x="790" y="404" width="230" height="14" rx="7" fill="#1A3260" />
    <rect x="790" y="404" width="160" height="14" rx="7" fill="url(#gold)" />

    <rect x="790" y="434" width="230" height="14" rx="7" fill="#1A3260" />
    <rect x="790" y="434" width="126" height="14" rx="7" fill="url(#gold)" />
  </g>

  <g>
    <rect x="88" y="112" width="172" height="44" rx="22" fill="#E8B872" fill-opacity="0.16" stroke="#E8B872" stroke-opacity="0.4" />
    <text x="174" y="140" text-anchor="middle" fill="#E8B872" font-family="Montserrat, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="0.8">ERP INMOBILIARIO</text>

    <text x="88" y="254" fill="#FFFFFF" font-family="Montserrat, Arial, sans-serif" font-size="84" font-weight="800" letter-spacing="-1.5">Inmovisoft</text>

    <text x="88" y="316" fill="#E8B872" font-family="Montserrat, Arial, sans-serif" font-size="44" font-weight="700" letter-spacing="-0.6">
      El sistema todo en uno para inmobiliarias
    </text>

    <text x="88" y="392" fill="#DCE4F3" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="400">
      Ventas, proyectos, finanzas, WhatsApp, firma y facturacion
    </text>

    <g transform="translate(88 454)">
      <rect width="330" height="68" rx="34" fill="url(#gold)" />
      <text x="165" y="44" text-anchor="middle" fill="#0B1628" font-family="Montserrat, Arial, sans-serif" font-size="28" font-weight="800">
        Solicita demo
      </text>
    </g>
  </g>
</svg>
